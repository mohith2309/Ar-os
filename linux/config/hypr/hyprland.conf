monitor = , preferred, auto, 1

exec-once = ~/.config/aros/autostart.sh

env = XCURSOR_SIZE,24
env = GDK_BACKEND,wayland

general {
    gaps_in = 6
    gaps_out = 16
    border_size = 2
    col.active_border = rgba(8B5CF6ff) rgba(B36CEBff) 45deg
    col.inactive_border = rgba(FFFFFF22)
    layout = dwindle
}

decoration {
    rounding = 16
    active_opacity = 0.98
    inactive_opacity = 0.94
    drop_shadow = true
    shadow_range = 28
    shadow_render_power = 3
    col.shadow = rgba(4A3870aa)
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
    }
}

animations {
    enabled = true
    bezier = arOS, 0.16, 1, 0.3, 1
    bezier = pop, 0.34, 1.56, 0.64, 1
    animation = windows, 1, 5, pop, popin 88%
    animation = windowsOut, 1, 4, arOS, popin 88%
    animation = fade, 1, 5, arOS
    animation = workspaces, 1, 6, arOS, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgba(1A0B30ff)
    focus_on_activate = true
}

input {
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

# floating, centered app windows like the concept (so titlebars/close are visible)
windowrulev2 = float, class:.*
windowrulev2 = center, class:.*
windowrulev2 = size 900 600, class:^(org.gnome.Nautilus|org.gnome.TextEditor|org.gnome.Loupe|org.gnome.Settings)$
windowrulev2 = size 820 520, class:^(kitty)$

$mod = SUPER
bind = $mod, RETURN, exec, kitty
bind = $mod, SPACE, exec, ~/.config/aros/launcher.sh
bind = $mod, E, exec, nautilus
bind = $mod, Q, killactive,
bind = $mod, C, killactive,
bind = $mod, F, fullscreen,
bind = $mod, V, togglefloating,
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
