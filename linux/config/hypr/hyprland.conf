# ╭───────────────────────────────────────────────╮
# │  arOS 3  —  Hyprland glassmorphism rice         │
# ╰───────────────────────────────────────────────╯

monitor = , preferred, auto, 1

# ---- autostart ----
exec-once = swww-daemon && sleep 1 && swww img ~/.config/aros/wallpaper.png --transition-type grow
exec-once = waybar -c ~/.config/waybar/top.jsonc   -s ~/.config/waybar/top.css
exec-once = waybar -c ~/.config/waybar/dock.jsonc  -s ~/.config/waybar/dock.css
exec-once = mako                       # notifications -> styled below
exec-once = hypridle

# ---- env ----
env = XCURSOR_SIZE,24
env = GTK_THEME,Adwaita:light

# ---- look & feel: the glass ----
general {
    gaps_in = 6
    gaps_out = 16
    border_size = 2
    col.active_border   = rgba(8B5CF6ff) rgba(B36CEBff) 45deg
    col.inactive_border = rgba(FFFFFF22)
    rounding = 18
    layout = dwindle
}

decoration {
    rounding = 18
    active_opacity = 0.97
    inactive_opacity = 0.92
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        contrast = 1.1
        brightness = 1.05
    }
    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = rgba(4A387055)
        color_inactive = rgba(4A387033)
    }
}

# ---- animations: spring, like the vid ----
animations {
    enabled = true
    bezier = arOS, 0.16, 1, 0.3, 1
    bezier = pop,  0.34, 1.56, 0.64, 1
    animation = windows,     1, 5, pop, popin 88%
    animation = windowsOut,  1, 4, arOS, popin 88%
    animation = fade,        1, 5, arOS
    animation = workspaces,  1, 6, arOS, slide
    animation = layers,      1, 5, pop, popin 90%
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgba(1A0B30ff)
}

input {
    follow_mouse = 1
    sensitivity = 0
    touchpad { natural_scroll = true }
}

# ---- keybinds ----
$mod = SUPER
bind = $mod, RETURN, exec, kitty
bind = $mod, SPACE,  exec, ~/.config/aros/launcher.sh
bind = $mod, E,      exec, nautilus
bind = $mod, Q,      killactive,
bind = $mod, L,      exec, swaylock
bind = $mod, F,      fullscreen,
bind = $mod, V,      togglefloating,
bind = $mod, left,   movefocus, l
bind = $mod, right,  movefocus, r
bind = $mod, up,     movefocus, u
bind = $mod, down,   movefocus, d
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# float app-grid / pickers as glass cards
windowrulev2 = float, class:^(aros-launcher)$
windowrulev2 = opacity 0.94 0.90, class:^(kitty)$
